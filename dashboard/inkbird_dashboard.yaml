# Inkbird INT-14-BW — "Cook Control" dashboard  —  PART 2 of 2 (the FRONT-END)
# ===========================================================================
# This is the visible dashboard — the probe cards, gauges, recipe buttons.
# It DEPENDS on PART 1 (inkbird_package.yaml): add that package first, or the
# targets, recipe buttons and °C/°F toggle here will have nothing to talk to.
#
# A faithful recreation of the concept dashboard using custom:button-card
# and card-mod (both from HACS → Frontend). Preview: see screenshot.png.
#
# HOW TO USE
#   1. Install the required HACS frontend cards (see dashboard/README.md):
#        - button-card
#        - card-mod
#   2. Add the helpers + automations from dashboard/inkbird_package.yaml.
#   3. Create a new dashboard in YAML mode and paste this file, OR paste the
#      `views:` block into an existing dashboard via "Edit in YAML".
#
# Entity IDs assumed (change to match yours — see inkbird_package.yaml):
#   sensor.int_14_bw_probe_1 … _4, sensor.int_14_bw_battery
#   input_number.inkbird_target_1 … _4, input_text.inkbird_name_1 … _4
#   sensor.inkbird_probe_1_state … _4, input_select.inkbird_active_probe

button_card_templates:
  # ---- one probe card -------------------------------------------------------
  inkbird_probe:
    show_name: false
    show_icon: false
    show_label: false
    tap_action:
      action: none
    styles:
      card:
        - padding: 18px
        - border-radius: 18px
        - border: 1px solid "#3a2f27"
        - border-top: >
            [[[
              var s = states[variables.pstate].state;
              var c = s==='ready' ? '#56c271' : s==='close' ? '#ff6a2c' : s==='heating' ? '#f2b441' : '#77695c';
              return '3px solid ' + c;
            ]]]
        - background: "linear-gradient(180deg,#211b16,#2b231d)"
        - box-shadow: 0 18px 40px -18px rgba(0,0,0,.7)
      grid:
        - grid-template-areas: '"header header header" "fig gauge side"'
        - grid-template-columns: 34px 128px 1fr
        - grid-template-rows: auto 1fr
        - gap: 14px
        - align-items: center
      custom_fields:
        header:
          - justify-self: stretch
        fig:
          - align-self: stretch
        side:
          - justify-self: stretch
    custom_fields:
      header: |
        [[[
          var s = states[variables.pstate].state;
          var name = states[variables.pname].state;
          var col = s==='ready' ? '#56c271' : s==='close' ? '#ff6a2c' : s==='heating' ? '#f2b441' : '#77695c';
          var label = s==='ready' ? 'Ready' : s==='close' ? 'Almost there' : s==='heating' ? 'Heating' : 'Not connected';
          return `<div style="display:flex;align-items:center;gap:11px;font-family:system-ui">
            <div style="width:30px;height:30px;border-radius:9px;display:grid;place-items:center;
                 font-family:ui-monospace,monospace;font-weight:700;background:#33291f;
                 border:1px solid #4d3f33;color:#f5ede4">P${variables.num}</div>
            <div style="flex:1;font-weight:620;font-size:1rem;color:#f5ede4">${name}
              <div style="font-size:.74rem;color:#a89a8c;font-weight:500">Probe ${variables.num}</div></div>
            <div style="font-size:.72rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
                 padding:5px 11px;border-radius:999px;color:${col};
                 background:${col}26;border:1px solid ${col}66">${label}</div>
          </div>`;
        ]]]
      fig: |
        [[[
          var s = states[variables.pstate].state;
          var connected = s !== 'idle';
          var col = s==='ready' ? '#56c271' : s==='close' ? '#ff6a2c' : s==='heating' ? '#f2b441' : '#77695c';
          var tip = connected ? col : '#77695c';
          var glow = connected ? `filter:drop-shadow(0 0 4px ${col})` : '';
          return `<svg viewBox="0 0 26 150" style="height:148px;width:auto;display:block;margin:auto">
            <defs>
              <linearGradient id="st${variables.num}" x1="0" x2="1" y1="0" y2="0">
                <stop offset="0" stop-color="#6c7075"/><stop offset=".28" stop-color="#eef1f3"/>
                <stop offset=".5" stop-color="#c4c9ce"/><stop offset=".72" stop-color="#eef1f3"/>
                <stop offset="1" stop-color="#5c6065"/></linearGradient>
              <linearGradient id="gl${variables.num}" x1="0" x2="1" y1="0" y2="0">
                <stop offset="0" stop-color="#0c0c0e"/><stop offset=".3" stop-color="#3a3a40"/>
                <stop offset=".5" stop-color="#141418"/><stop offset=".75" stop-color="#2a2a30"/>
                <stop offset="1" stop-color="#050506"/></linearGradient>
              <linearGradient id="rg${variables.num}" x1="0" x2="1" y1="0" y2="0">
                <stop offset="0" stop-color="#8a8e93"/><stop offset=".5" stop-color="#f2f4f6"/>
                <stop offset="1" stop-color="#7a7e83"/></linearGradient>
            </defs>
            <ellipse cx="13" cy="6" rx="7.5" ry="2.6" fill="url(#rg${variables.num})"/>
            <path d="M5.5 6 L20.5 6 L17 52 L9 52 Z" fill="url(#gl${variables.num})" stroke="#000" stroke-width=".6"/>
            <text x="13" y="30" text-anchor="middle" font-family="ui-monospace,monospace"
                  font-weight="700" font-size="10" fill="${connected?'#f0f0f2':'#8a8a8c'}">${variables.num}</text>
            <rect x="8.5" y="52" width="9" height="4" rx="1" fill="url(#rg${variables.num})"/>
            <rect x="10" y="56" width="6" height="82" fill="url(#st${variables.num})"/>
            <path d="M10 138 L16 138 L13 150 Z" fill="${tip}" style="${glow}"/>
          </svg>`;
        ]]]
      gauge: |
        [[[
          var t = parseFloat(states[variables.probe].state);
          var g = parseFloat(states[variables.target].state);
          var s = states[variables.pstate].state;
          var amb = 22, connected = !isNaN(t);
          var col = s==='ready' ? '#56c271' : s==='close' ? '#ff6a2c' : s==='heating' ? '#f2b441' : '#77695c';
          var pct = connected ? Math.max(0, Math.min(1,(t-amb)/(g-amb))) : 0;
          var R=52, C=2*Math.PI*R, ARC=0.75;
          var dash=(C*ARC*pct).toFixed(1)+' '+C;
          var uf = states['input_select.inkbird_unit'].state.indexOf('F') >= 0;
          var us = uf ? '°F' : '°C';
          var cv = function(c){ return uf ? Math.round(c*9/5+32) : Math.round(c*10)/10; };
          var temp = connected ? cv(t) : '—';
          return `<div style="position:relative;width:128px;height:128px;margin:auto">
            <svg width="128" height="128" viewBox="0 0 128 128" style="transform:rotate(135deg)">
              <circle cx="64" cy="64" r="${R}" fill="none" stroke="#33291f" stroke-width="9"
                stroke-linecap="round" stroke-dasharray="${(C*ARC).toFixed(1)} ${C}"/>
              <circle cx="64" cy="64" r="${R}" fill="none" stroke="${col}" stroke-width="9"
                stroke-linecap="round" stroke-dasharray="${dash}"
                style="transition:stroke-dasharray .6s ease,stroke .4s"/>
            </svg>
            <div style="position:absolute;inset:0;display:flex;flex-direction:column;
                 align-items:center;justify-content:center;font-family:ui-monospace,monospace">
              <div style="font-size:1.7rem;font-weight:650;color:#f5ede4;line-height:1">${temp}<span style="font-size:.9rem;color:#a89a8c">${us}</span></div>
              <div style="font-size:.72rem;color:#77695c;margin-top:2px">${connected?'target '+cv(g)+'°':'no probe'}</div>
            </div>
          </div>`;
        ]]]
      side: |
        [[[
          var t = parseFloat(states[variables.probe].state);
          var g = parseFloat(states[variables.target].state);
          var s = states[variables.pstate].state;
          var connected = !isNaN(t);
          var uf = states['input_select.inkbird_unit'].state.indexOf('F') >= 0;
          var us = uf ? '°F' : '°C';
          var cv = function(c){ return uf ? Math.round(c*9/5+32) : Math.round(c*10)/10; };
          var togo = uf ? Math.round((g-t)*9/5) : Math.round((g-t)*10)/10;
          var footer = !connected ? 'Insert a probe to begin'
            : (s==='ready' ? 'Reached target — resting'
            : Math.max(0, togo) + '° to go');
          return `<div style="display:flex;flex-direction:column;gap:12px;font-family:system-ui">
            <div style="display:flex;align-items:center;gap:10px">
              <span style="flex:1;font-size:.72rem;text-transform:uppercase;letter-spacing:.12em;color:#77695c">Target</span>
              <span style="font-family:ui-monospace,monospace;font-weight:600;font-size:1.05rem;color:#f5ede4">${cv(g)}${us}</span>
            </div>
            <div style="font-size:.78rem;color:#a89a8c">${footer}</div>
          </div>`;
        ]]]
      minus:
        card:
          type: custom:button-card
          name: "−"
          tap_action:
            action: call-service
            service: input_number.decrement
            target:
              entity_id: "[[[ return variables.target ]]]"
          styles:
            card:
              - height: 40px
              - border-radius: 10px
              - border: 1px solid "#4d3f33"
              - background: "#33291f"
              - color: "#f5ede4"
              - font-size: 1.3rem
      plus:
        card:
          type: custom:button-card
          name: "+"
          tap_action:
            action: call-service
            service: input_number.increment
            target:
              entity_id: "[[[ return variables.target ]]]"
          styles:
            card:
              - height: 40px
              - border-radius: 10px
              - border: 1px solid "#4d3f33"
              - background: "#33291f"
              - color: "#ff6a2c"
              - font-size: 1.3rem

  # ---- one recipe preset ----------------------------------------------------
  inkbird_recipe:
    show_icon: true
    icon: mdi:silverware-fork-knife
    styles:
      card:
        - padding: 14px
        - border-radius: 14px
        - border: 1px solid "#3a2f27"
        - background: "#211b16"
      grid:
        - grid-template-areas: '"i" "n" "t" "s"'
        - grid-template-rows: auto auto auto auto
        - gap: 6px
        - justify-items: start
      icon:
        - color: "[[[ return variables.color ]]]"
        - width: 30px
      name:
        - color: "#f5ede4"
        - font-weight: 620
        - font-size: .92rem
        - justify-self: start
      custom_fields:
        t:
          - justify-self: start
        s:
          - justify-self: start
    custom_fields:
      t: |
        [[[ return `<div style="font-family:ui-monospace,monospace;font-weight:650;font-size:1.15rem;color:#ff6a2c">${variables.temp}<span style="font-size:.74rem;color:#a89a8c">°C</span></div>`; ]]]
      s: |
        [[[ return `<div style="font-size:.74rem;color:#a89a8c">${variables.note}</div>`; ]]]
    tap_action:
      action: call-service
      service: script.inkbird_apply_recipe
      data:
        label: "[[[ return variables.rname ]]]"
        target: "[[[ return variables.temp ]]]"

title: Cook Control
views:
  - title: Cook Control
    path: cook
    icon: mdi:grill
    theme: default
    cards:
      # ---- header ----
      - type: markdown
        content: >
          ## 🔥 Cook Control — Inkbird INT-14-BW
        card_mod:
          style: |
            ha-card { background: none; border: none; box-shadow: none; color: #f5ede4; }

      # ---- base station status ----
      - type: entities
        title: Base station
        entities:
          - entity: sensor.int_14_bw_battery
            name: Base battery
          - entity: input_select.inkbird_active_probe
            name: Active probe (for recipes)
          - entity: input_select.inkbird_unit
            name: Temperature unit
        card_mod:
          style: |
            ha-card {
              background: linear-gradient(180deg,#211b16,#2b231d);
              border:1px solid #3a2f27; border-radius:18px; color:#f5ede4;
            }

      # ---- probe grid ----
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:button-card
            template: inkbird_probe
            variables:
              num: 1
              probe: sensor.int_14_bw_probe_1
              target: input_number.inkbird_target_1
              pname: input_text.inkbird_name_1
              pstate: sensor.inkbird_probe_1_state
          - type: custom:button-card
            template: inkbird_probe
            variables:
              num: 2
              probe: sensor.int_14_bw_probe_2
              target: input_number.inkbird_target_2
              pname: input_text.inkbird_name_2
              pstate: sensor.inkbird_probe_2_state
          - type: custom:button-card
            template: inkbird_probe
            variables:
              num: 3
              probe: sensor.int_14_bw_probe_3
              target: input_number.inkbird_target_3
              pname: input_text.inkbird_name_3
              pstate: sensor.inkbird_probe_3_state
          - type: custom:button-card
            template: inkbird_probe
            variables:
              num: 4
              probe: sensor.int_14_bw_probe_4
              target: input_number.inkbird_target_4
              pname: input_text.inkbird_name_4
              pstate: sensor.inkbird_probe_4_state

      # ---- recipe presets (apply to the Active probe selected above) ----
      - type: markdown
        content: >
          #### Recipe presets — first pick the **Active probe** above, then tap a recipe
        card_mod:
          style: |
            ha-card { background:none;border:none;box-shadow:none;color:#a89a8c; }
      - type: grid
        columns: 5
        square: false
        cards:
          - type: custom:button-card
            template: inkbird_recipe
            name: Beef Brisket
            variables: { rname: Beef Brisket, temp: 93, note: Low & slow, color: "#b0442a" }
          - type: custom:button-card
            template: inkbird_recipe
            name: Chicken
            variables: { rname: Chicken, temp: 74, note: Food-safe, color: "#e0a23a" }
          - type: custom:button-card
            template: inkbird_recipe
            name: Medium Steak
            variables: { rname: Medium Steak, temp: 57, note: Pull temp, color: "#c25a3c" }
          - type: custom:button-card
            template: inkbird_recipe
            name: Pork Ribs
            variables: { rname: Pork Ribs, temp: 90, note: Fall-off, color: "#a9563b" }
          - type: custom:button-card
            template: inkbird_recipe
            name: Salmon
            variables: { rname: Salmon, temp: 52, note: Just flaky, color: "#e07a52" }

      # ---- alerts ----
      - type: markdown
        content: |
          {% set ns = namespace(rows=[]) %}
          {% for i in range(1,5) %}
            {% set s = states('sensor.inkbird_probe_' ~ i ~ '_state') %}
            {% set n = states('input_text.inkbird_name_' ~ i) %}
            {% set g = states('input_number.inkbird_target_' ~ i) | int %}
            {% if s == 'ready' %}
              {% set ns.rows = ns.rows + ['🟢 **' ~ n ~ '** reached ' ~ g ~ '°C — ready'] %}
            {% elif s == 'close' %}
              {% set ns.rows = ns.rows + ['🟡 **' ~ n ~ '** almost there (target ' ~ g ~ '°C)'] %}
            {% endif %}
          {% endfor %}
          ### Alerts
          {% if ns.rows | length == 0 %}
          _No alerts. Everything's on track._
          {% else %}
          {% for r in ns.rows %}- {{ r }}
          {% endfor %}
          {% endif %}
        card_mod:
          style: |
            ha-card {
              background: linear-gradient(180deg,#211b16,#2b231d);
              border:1px solid #3a2f27; border-radius:18px; color:#f5ede4;
            }
