name: Feature request
description: Suggest an improvement or a new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: What are you trying to do that isn't possible today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work?
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: |
        Device details, protocol notes, captures, or references that could help.
    validations:
      required: false
